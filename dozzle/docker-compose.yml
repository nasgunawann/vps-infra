services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    environment:
      - DOZZLE_REMOTE_HOST=tcp://docker-socket-proxy:2375
    networks:
      - proxy-network
      - socket-network
    deploy:
      resources:
        limits:
          memory: 50M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-network:
    external: true
  socket-network:
    external: true
