services:
  postgres:
    image: ghcr.io/ferretdb/postgres-documentdb:16
    container_name: komodo-postgres
    restart: unless-stopped
    labels:
      komodo.skip: "true"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${KOMODO_DB_USER}
      POSTGRES_PASSWORD: ${KOMODO_DB_PASSWORD}
      POSTGRES_DB: postgres
    networks:
      - komodo-internal
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:2
    container_name: komodo-ferretdb
    restart: unless-stopped
    depends_on:
      - postgres
    labels:
      komodo.skip: "true"
    volumes:
      - ./data/ferretdb:/state
    environment:
      FERRETDB_POSTGRESQL_URL: postgres://${KOMODO_DB_USER}:${KOMODO_DB_PASSWORD}@postgres:5432/postgres
    networks:
      - komodo-internal
    deploy:
      resources:
        limits:
          memory: 150M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  core:
    image: ghcr.io/moghtech/komodo-core:2
    container_name: komodo-core
    init: true
    restart: unless-stopped
    depends_on:
      - ferretdb
    # Remove "127.0.0.1:9120:9120" to completely hide it from the host machine loopback
    ports: []
    environment:
      KOMODO_DATABASE_ADDRESS: ferretdb:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USER}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET}
      KOMODO_WEBHOOK_SECRET: ${KOMODO_WEBHOOK_SECRET}
      KOMODO_LOCAL_AUTH: "true"
      KOMODO_INIT_ADMIN_USERNAME: ${KOMODO_ADMIN_USER}
      KOMODO_INIT_ADMIN_PASSWORD: ${KOMODO_ADMIN_PASSWORD}
      KOMODO_FIRST_SERVER_NAME: "Local"
      KOMODO_PERIPHERY_PUBLIC_KEY: file:/config/keys/periphery.pub
    volumes:
      - ./data/komodo-keys:/config/keys
      - /etc/komodo/backups:/backups
    networks:
      - komodo-internal
      - proxy-network # Keep this, it allows NPM to see komodo-core
    deploy:
      resources:
        limits:
          memory: 400M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  periphery:
    image: ghcr.io/moghtech/komodo-periphery:2
    container_name: komodo-periphery
    init: true
    restart: unless-stopped
    depends_on:
      - core
    environment:
      PERIPHERY_CORE_ADDRESS: ws://core:9120
      PERIPHERY_CONNECT_AS: "Local"
      PERIPHERY_CORE_PUBLIC_KEYS: file:/config/keys/core.pub
      PERIPHERY_ROOT_DIRECTORY: /etc/komodo
      PERIPHERY_INCLUDE_DISK_MOUNTS: /etc/hostname
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    volumes:
      - ./data/komodo-keys:/config/keys
      - /proc:/proc
      - /etc/komodo:/etc/komodo
    networks:
      - komodo-internal
      - socket-network
    deploy:
      resources:
        limits:
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  komodo-internal:
  proxy-network:
    external: true
  socket-network:
    external: true
